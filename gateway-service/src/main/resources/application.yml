server:
  port: 8083

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: banking-service
              uri: http://banking-service:8080
              predicates:
                - Path=/banking/**

            - id: audit-service
              uri: http://audit-service:8081
              predicates:
                - Path=/audit/**

            - id: master-data-service
              uri: http://master-data-service:8082
              predicates:
                - Path=/master-data/**

