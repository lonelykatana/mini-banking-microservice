services:

  postgres:
    image: postgres:16
    container_name: banking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banking_db
    ports:
      - "5431:5432"
    networks:
      - banking-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - banking-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    networks:
      - banking-network

  zookeeper:
    image: wurstmeister/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    networks:
      - banking-network

  kafka:
    image: wurstmeister/kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - banking-network

  banking-service:
    build: ./banking-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - banking-network

  audit-service:
    build: ./audit-service
    ports:
      - "8081:8081"
    depends_on:
      - mongo
      - kafka
    networks:
      - banking-network

  master-data-service:
    build: ./master-data-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - banking-network

  gateway-service:
    build: ./gateway-service
    ports:
      - "8083:8083"
    depends_on:
      - banking-service
      - audit-service
      - master-data-service
    networks:
      - banking-network

networks:
  banking-network:
    driver: bridge